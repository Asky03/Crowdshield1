# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────
# CrowdShield CI Pipeline
# Runs on every push to any branch except main
# Runs on every Pull Request targeting main
# Must pass before merging is allowed
# ─────────────────────────────────────────────────────────────

name: CrowdShield CI

on:
  push:
    branches-ignore:
      - main          # don't run on direct main pushes (use PRs)
  pull_request:
    branches:
      - main          # run on every PR targeting main

jobs:
  # ── Job 1: Backend tests ──────────────────────────────────
  backend-tests:
    name: Backend — Node.js tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-minimum-32-chars-long-abc123
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          SUPABASE_JWT_SECRET: placeholder-jwt-secret
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: placeholder-bucket
          AWS_SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:placeholder
          ML_SERVICE_URL: http://localhost:8000
          ADMIN_EMAILS: admin@test.com
          FRONTEND_URL: http://localhost:5000
        run: npm test

      - name: Check no secrets in code
        working-directory: backend
        run: |
          if grep -r "eyJhbGci" src/ --include="*.js" | grep -v ".env"; then
            echo "ERROR: Possible hardcoded JWT token found in source!"
            exit 1
          fi
          echo "Secret scan passed"

  # ── Job 2: Python ML tests ────────────────────────────────
  ml-tests:
    name: ML Service — Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install ML dependencies
        working-directory: ml
        run: pip install -r requirements.txt

      - name: Run ML tests
        working-directory: ml
        run: python tests/test_full_pipeline.py

  # ── Job 3: Lint check ─────────────────────────────────────
  lint:
    name: Code quality check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Check for console.log in controllers
        working-directory: backend
        run: |
          COUNT=$(grep -r "console.log" src/controllers/ --include="*.js" | wc -l)
          echo "console.log count in controllers: $COUNT"
          # Warn but don't fail — just flag it
      - name: Verify .env is not committed
        run: |
          if [ -f "backend/.env" ]; then
            echo "ERROR: backend/.env file is committed! Remove it immediately."
            exit 1
          fi
          echo ".env check passed — not committed"