<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — CrowdShield</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0d0f1a;color:#e2e8f0;min-height:100vh;
     display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#141624;border:1px solid #252842;border-radius:16px;
      padding:2.5rem;width:100%;max-width:420px}
h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:.4rem}
h1 span{background:linear-gradient(135deg,#4f8ef7,#7c6af7);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent}
p.sub{text-align:center;color:#8892a4;font-size:.88rem;margin-bottom:1.8rem}
label{display:block;font-size:.82rem;color:#8892a4;margin-bottom:.35rem;font-weight:500}
input{width:100%;background:#0d0f1a;border:1px solid #252842;color:#e2e8f0;
      padding:.65rem .9rem;border-radius:8px;font-size:.9rem;margin-bottom:1rem}
input:focus{outline:none;border-color:#4f8ef7}
button{width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:8px;
       padding:.65rem;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.3rem}
button:hover{opacity:.85}
button:disabled{background:#252842;color:#8892a4;cursor:not-allowed}
.msg{padding:.75rem;border-radius:8px;font-size:.88rem;text-align:center;
     margin-top:1rem;display:none}
.msg.ok{background:#052e16;color:#22c55e;border:1px solid #16a34a}
.msg.err{background:#450a0a;color:#f87171;border:1px solid #dc2626}
.back{text-align:center;margin-top:1.2rem;font-size:.85rem}
.back a{color:#4f8ef7;cursor:pointer;text-decoration:none}
.req{font-size:.76rem;color:#8892a4;margin-top:-.6rem;margin-bottom:.8rem}
</style>
</head>
<body>
<div class="card">
  <h1>🛡️ <span>CrowdShield</span></h1>
  <p class="sub">Set your new password</p>

  <div id="loading" style="text-align:center;color:#8892a4;font-size:.9rem">
    Verifying reset link...
  </div>

  <div id="form-wrap" style="display:none">
    <label>New Password</label>
    <input type="password" id="new-pass" placeholder="Min 8 chars, 1 uppercase, 1 number"/>
    <div class="req">At least 8 characters · 1 uppercase letter · 1 number</div>

    <label>Confirm Password</label>
    <input type="password" id="confirm-pass" placeholder="Repeat your new password"
           onkeydown="if(event.key==='Enter')resetPassword()"/>

    <button id="reset-btn" onclick="resetPassword()">Set New Password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="error-wrap" style="display:none;text-align:center;color:#f87171;font-size:.88rem">
    Invalid or expired reset link.<br>
    <a href="index.html" style="color:#4f8ef7">Go back to login</a>
  </div>

  <div class="back"><a href="index.html">← Back to Login</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Replace these with your real Supabase values ──────────────
// These are the ANON (public) keys — safe to use in frontend
const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';
// ─────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function init() {
  // Supabase puts the recovery token in the URL hash when user clicks reset link
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const type = params.get('type');
  const accessToken = params.get('access_token');

  if (type === 'recovery' && accessToken) {
    // Set the session from the recovery token
    const { error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: params.get('refresh_token') || '',
    });

    if (error) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-wrap').style.display = 'block';
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form-wrap').style.display = 'block';
    }
  } else {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-wrap').style.display = 'block';
  }
}

async function resetPassword() {
  const pass = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const btn = document.getElementById('reset-btn');
  const msg = document.getElementById('msg');

  msg.style.display = 'none';

  if (pass.length < 8) {
    showMsg('Password must be at least 8 characters', 'err'); return;
  }
  if (!/[A-Z]/.test(pass)) {
    showMsg('Password must contain at least one uppercase letter', 'err'); return;
  }
  if (!/[0-9]/.test(pass)) {
    showMsg('Password must contain at least one number', 'err'); return;
  }
  if (pass !== confirm) {
    showMsg('Passwords do not match', 'err'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: pass });

  if (error) {
    showMsg('Failed to update password: ' + error.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Set New Password';
  } else {
    showMsg('✅ Password updated! Redirecting to login...', 'ok');
    setTimeout(() => { window.location.href = 'index.html'; }, 2500);
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
